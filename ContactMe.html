          <div class="row">
            <div class="right-content">
              <div class="container">
                <form id="contact" action="" method="post">
                  <div class="row">
                    <div class="col-md-6">
                      <fieldset>
                        <input
                        placeholder="您的名字"
                        type="text"
                        tabindex="1"
                        required
                        autofocus
                        class="username"
                        />
                      </fieldset>
                    </div>
                    <div class="col-md-6">
                      <fieldset>     
                        <form>
                        <input type="email" class="email"  id="email" placeholder="Email"
                        pattern="/^[a-zA-Z0-9.!#$%&’*+/=?^_`{|}~-]+@[a-zA-Z0-9-]+(?:\.[a-zA-Z0-9-]+)*$/"  required>                   
                        </form>>
                      </fieldset>
                    </div>
                    <div class="col-md-12">
                      <fieldset>
                        <input name="subject"  type="text"  class="form-control"  id="subject"  placeholder="主旨 ( 選填 ) "   required=""/>
                      </fieldset>
                    </div>
                    <div class="col-md-12">
                      <fieldset>
                        <textarea   placeholder="說些什麼...." tabindex="5" required class="message"></textarea>
                      </fieldset>
                    </div>
                    <div class="col-md-12">
                      <fieldset>
                        <button name="submit"  type="submit"  id="contact-submit" data-submit="...Sending"  class="submit"> 發送訊息</button>
                      </fieldset>
                    </div>
                  </div>
                </form>
              </div>
